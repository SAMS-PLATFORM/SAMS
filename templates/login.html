<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS - Identity Verification Gateway</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #f7fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: linear-gradient(145deg, #111827, #1f2937);
            border: 1px solid #2d3748;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        h1 {
            color: #00f2fe;
            margin-bottom: 10px;
            font-size: 22pt;
            letter-spacing: 1px;
        }
        p.subtitle {
            color: #a0aec0;
            margin-bottom: 30px;
            font-size: 11pt;
        }
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e0;
            font-size: 10.5pt;
        }
        input {
            width: 100%;
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #4a5568;
            border-radius: 8px;
            color: #fff;
            font-size: 11pt;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 8px rgba(79, 172, 254, 0.4);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 8px;
            color: #0b0f19;
            font-size: 12pt;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .flash-messages-danger {
            background-color: #742a2a;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 10.5pt;
            border: 1px solid #e53e3e;
        }
        .flash-messages-success {
            background-color: #22543d;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 10.5pt;
            border: 1px solid #38a169;
        }
        .link-footer {
            margin-top: 25px;
            font-size: 10pt;
            color: #a0aec0;
        }
        .link-footer a {
            color: #00f2fe;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>VERIFICATION GATE</h1>
        <p class="subtitle">Authenticate Credentials via Cryptographic DB</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-messages-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/" method="POST">
            <div class="form-group">
                <label for="username">Verify Account Name</label>
                <input type="text" id="username" name="username" required placeholder="Enter registered name">
            </div>
            <div class="form-group">
                <label for="password">Verify Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn">VERIFY & LOG IN</button>
        </form>

        <div class="link-footer">
            Don't have an account? <a href="/register">Create Account</a>
        </div>
    </div>

</body>
</html>
