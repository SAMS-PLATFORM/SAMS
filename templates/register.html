<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS | Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060913;
            --card: rgba(15, 23, 42, 0.6);
            --purple: #9d4edd;
            --cyan: #00f2fe;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, #140d27 0%, var(--bg) 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #f8fafc;
        }
        .container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, var(--purple), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        .header p {
            color: #64748b;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 5px;
        }
        .card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(157, 78, 221, 0.15);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        .group {
            margin-bottom: 20px;
        }
        .group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--purple);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .group input, .group select {
            width: 100%;
            padding: 14px;
            background: rgba(5, 8, 16, 0.8);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: 0.3s;
        }
        .group input:focus, .group select:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.2);
        }
        .btn {
            background: linear-gradient(90deg, var(--purple), #7b2cbf);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(157, 78, 221, 0.4);
        }
        .link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .link a {
            color: var(--purple);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SAMS SYSTEM</h1>
            <p>Node Enrollment</p>
        </div>
        <div class="card">
            <form action="/register" method="POST">
                <div class="group">
                    <label>Identity Username</label>
                    <input type="text" name="username" required autocomplete="off">
                </div>
                <div class="group">
                    <label>System Keypair Pass</label>
                    <input type="password" name="password" required>
                </div>
                <div class="group">
                    <label>Clearance Level</label>
                    <select name="role" required>
                        <option value="Admin">System Administrator</option>
                        <option value="Manager">Security Manager</option>
                        <option value="Staff">Operational Staff</option>
                    </select>
                </div>
                <button type="submit" class="btn">Provision Account</button>
            </form>
            <div class="link">
                Already registered? <a href="/login">Identity Gate</a>
            </div>
        </div>
    </div>
</body>
</html>
